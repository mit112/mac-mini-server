##############################################################################
# Job Search Automation Stack
# Services: n8n, Changedetection.io, Playwright (for JS rendering)
# Optional: Ollama (local LLM fallback)
#
# Usage:
#   1. Copy this file and the .env file to a folder on your server
#   2. Edit the .env file with your settings
#   3. Run: docker compose up -d
#   4. Access n8n at http://localhost:5678
#   5. Access changedetection at http://localhost:5000
#
# To also run the local LLM fallback:
#   docker compose --profile local-llm up -d
#   docker exec ollama ollama pull llama3.1:8b
##############################################################################

services:

  # ==========================================================================
  # n8n — Workflow Automation Engine
  # Runs your job search workflows on a daily schedule.
  # Access at: http://localhost:5678
  # ==========================================================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${TIMEZONE:-America/Chicago}
      - TZ=${TIMEZONE:-America/Chicago}
      - N8N_RUNNERS_ENABLED=true
    volumes:
      - n8n-data:/home/node/.n8n
      - n8n-files:/files
    networks:
      - job-search-net

  # ==========================================================================
  # Changedetection.io — Career Page Monitor
  # Watches company career pages and alerts you when new jobs appear.
  # Access at: http://localhost:5000
  # ==========================================================================
  changedetection:
    image: dgtlmoon/changedetection.io:latest
    container_name: changedetection
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - changedetection-data:/datastore
    environment:
      - PLAYWRIGHT_DRIVER_URL=ws://playwright-chrome:3000
      - BASE_URL=http://localhost:5000
      - TZ=${TIMEZONE:-America/Chicago}
    networks:
      - job-search-net
    depends_on:
      - playwright-chrome

  # ==========================================================================
  # Playwright Chrome — Headless Browser for Changedetection
  # Renders JavaScript-heavy career pages (Greenhouse, Lever, etc.)
  # ==========================================================================
  playwright-chrome:
    image: dgtlmoon/sockpuppetbrowser:latest
    container_name: playwright-chrome
    restart: unless-stopped
    environment:
      - SCREEN_WIDTH=1920
      - SCREEN_HEIGHT=1024
      - MAX_CONCURRENT_CHROME_PROCESSES=5
    networks:
      - job-search-net

  # ==========================================================================
  # Ollama — Local LLM (OPTIONAL FALLBACK)
  # Only starts if you run: docker compose --profile local-llm up -d
  # Use this if free API tiers get cut or you want full privacy.
  # After starting: docker exec ollama ollama pull llama3.1:8b
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - job-search-net
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  n8n-data:
  n8n-files:
  ollama-data:
  changedetection-data:

networks:
  job-search-net:
    driver: bridge
